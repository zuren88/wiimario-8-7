  <script>
'use strict';

// ============================================================
// CANVAS SETUP（devicePixelRatio対応）
// ゲームロジック・描画はすべて LW/LH を参照（canvas.width/height 参照禁止）
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

// LH は常に 1050（論理ピクセル）= 21タイル固定
// LW は画面幅をスケール後の論理幅に換算した値
const LH = 1050;
let LW = window.innerWidth;
let _scale = 1;

function resizeCanvas() {
  const dpr    = window.devicePixelRatio || 1;
  const screenW = window.innerWidth;
  const screenH = window.innerHeight;
  _scale = screenH / LH;          // 縦21行が画面いっぱいに収まる倍率
  LW = screenW / _scale;          // 論理幅（ゲームロジックはこれを参照）
  canvas.width        = screenW * dpr;
  canvas.height       = screenH * dpr;
  canvas.style.width  = screenW + 'px';
  canvas.style.height = screenH + 'px';
  ctx.setTransform(dpr * _scale, 0, 0, dpr * _scale, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ============================================================
// 物理定数
// ============================================================
const GRAVITY        = 5600;  // px/s²（旧2800の2倍）
const MOVE_SPEED     = 220;   // px/s  通常歩き
const RUN_SPEED      = 540;   // px/s  ダッシュ
const MAX_FALL_SPEED = 800;   // px/s  落下速度上限

// 3段ジャンプ
// 有効重力 = GRAVITY × 0.7 = 3920, h = v²/(2×3920)
// 3段目 = STAGE_HEIGHT/2 = 525px, 他は元比率(143:241:360)を維持
// 1段目≈209px  2段目≈352px  3段目=525px
const JUMP_FORCE        = -1279;  // 通常ジャンプ（ダッシュなし）≈209px
const JUMP_FORCE_1      = -1279;  // ダッシュ1段目 ≈209px
const JUMP_FORCE_2      = -1661;  // ダッシュ2段目 ≈352px
const JUMP_FORCE_3      = -2029;  // ダッシュ3段目 =525px（マップ高さの半分）
const JUMP_CHAIN_WINDOW = 0.15;   // 着地後の連鎖受付時間（秒）

// ============================================================
// ステージ定数
// ============================================================
const TILE_SIZE    = 50;
const STAGE_WIDTH  = 21600;   // RUN_SPEED(540)×40秒
const TILE_UNIT    = 30;      // 1高さ単位 = しゃがみマリオの高さ
const STAGE_HEIGHT = 1050;    // 1050÷50=21行
const MAP_COLS     = STAGE_WIDTH  / TILE_SIZE; // 432
const MAP_ROWS     = STAGE_HEIGHT / TILE_SIZE; // 21
const GOAL_X       = STAGE_WIDTH - 150;  // ゴールポール中心X
const HOUSE_X      = GOAL_X + 240;       // ゴール後の家X（左端）

// マリオ寸法
const MARIO_W        = TILE_SIZE;                    // 50px（1タイル）
const MARIO_H        = TILE_SIZE;                    // 50px（1タイル・通常状態）
const MARIO_SUPER_H  = TILE_SIZE * 2;               // 100px（2タイル・スーパー/ファイア状態）
const MARIO_CROUCH_H = Math.round(TILE_SIZE * 0.6); // 30px（しゃがみ・通常状態）

// マリオ火の玉
const MARIO_FIRE_RATE = 0.25; // 発射間隔(秒) Rキー連続押し

// アイテム
const ITEM_MUSHROOM_SPEED = 100; // キノコの水平速度 px/s
const ITEM_SPAWN_SPEED    = 80;  // アイテム出現上昇速度 px/s

// ============================================================
// アセット読み込み
// ============================================================
const BASE_URL = 'https://zuren88.github.io/gltf-assets/';
const IMGS = {};
const IMG_KEYS = ['背景','地面上','地面中','土管','土管中','ハテナブロック','レンガ','コイン','ブラックパックン','マリオ','ゴールポール','ゴール','リフト','ファイアブロス','パックン','パックン上','キノコ','ファイアフラワー','スーパーマリオ','ファイアマリオ','スターコイン',
                  '地面火山上','地面火山中','ハテナブロック赤','コイン赤','赤リング'];

let assetsLoaded = 0;
IMG_KEYS.forEach(key => {
  const ext = key === '地面上' || key === '地面中' ? '.jpg' : '.png';
  const img = new Image();
  img.src = BASE_URL + encodeURIComponent(key) + ext;
  img.onload = () => assetsLoaded++;
  IMGS[key] = img;
});

function imgReady(key) { return IMGS[key] && IMGS[key].complete && IMGS[key].naturalWidth > 0; }

// ============================================================
// MAP配列（Uint8Array 432×21 = 9072要素・row-major）
// ID:  0=空気  1=地面上  2=氷  3=ブラックパックン  4=土管地面
//      5=土管天井  6=ハテナ  7=レンガ  8=コイン
//      9=地面上上(反転)  10=地面中上(反転)  11=土管中  12=地面中
// ============================================================
const MAP         = new Uint8Array(MAP_COLS * MAP_ROWS);
const MAP_OVERLAY = new Uint8Array(MAP_COLS * MAP_ROWS); // 氷・パックン等を30%透明描画

function setT(c, r, id) {
  if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) return;
  MAP[r * MAP_COLS + c] = id;
}
function hLine(c, r, len, id) { for (let i=0;i<len;i++) setT(c+i,r,id); }
function ovrT(c, r, id) {
  if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) return;
  MAP_OVERLAY[r * MAP_COLS + c] = id;
}
function ovrLine(c, r, len, id) { for (let i=0;i<len;i++) ovrT(c+i,r,id); }
function mRect(c, r, w, h, id) { for(let dr=0;dr<h;dr++) hLine(c,r+dr,w,id); }
// 土管はMAPに置かず別配列で管理（1枚画像を拡大描画）
// { x, y, w, h, flip } flip=true で天井型（上下反転）
const PIPES = [];
function gPipe(c, r, tileH) {
  const pw = TILE_SIZE * 3, ph = TILE_SIZE * tileH;  // 横3タイル
  PIPES.push({ x: c*TILE_SIZE, y: r*TILE_SIZE, w: pw, h: ph, flip: false });
  for (let dr=0; dr<tileH; dr++) for (let dc=0; dc<3; dc++) setT(c+dc, r+dr, 4);
}
function cPipe(c, r, tileH) {
  const pw = TILE_SIZE * 3, ph = TILE_SIZE * tileH;  // 横3タイル
  PIPES.push({ x: c*TILE_SIZE, y: r*TILE_SIZE, w: pw, h: ph, flip: true });
  for (let dr=0; dr<tileH; dr++) for (let dc=0; dc<3; dc++) setT(c+dc, r+dr, 5);
}

// ============================================================
// スターコイン（2×2タイル エンティティ方式）
// ============================================================
let STAR_COINS = [];
function addStarCoin(c, r) {
  STAR_COINS.push({
    x: c * TILE_SIZE,
    y: r * TILE_SIZE,
    w: TILE_SIZE * 2,   // 100px（2タイル）
    h: TILE_SIZE * 2,   // 100px（2タイル）
    collected: false,
  });
}

// ============================================================
// リフト（横6タイル・水平往復）
// ============================================================
let LIFTS = [];
function addLift(c, r) {
  LIFTS.push({
    x:      c * TILE_SIZE,
    y:      r * TILE_SIZE,
    w:      TILE_SIZE * 6,
    h:      TILE_SIZE,
    initY:  r * TILE_SIZE,
    speed:  60,    // px/s
    dir:    1,     // 1=下向き, -1=上向き
    rangeU: TILE_SIZE * 3,  // 上方向3マス
    rangeD: TILE_SIZE * 3,  // 下方向3マス
  });
}

// ============================================================
// 敵エンティティ（ファイアブロス: 横1・縦2タイル）
// ============================================================
let ENEMIES = [];
function addFireBros(c, r) {
  ENEMIES.push({
    imgKey: 'ファイアブロス',
    x: c * TILE_SIZE, y: r * TILE_SIZE,
    w: TILE_SIZE * 2, h: TILE_SIZE * 2,
    initX: c * TILE_SIZE, initY: r * TILE_SIZE,
  });
}
function addPakkunB(c, r) {
  ENEMIES.push({
    imgKey: 'パックン',
    x: c * TILE_SIZE, y: r * TILE_SIZE,
    w: TILE_SIZE * 2, h: TILE_SIZE * 3,
    initX: c * TILE_SIZE, initY: r * TILE_SIZE,
  });
}
function addPakkunT(c, r) {
  ENEMIES.push({
    imgKey: 'パックン上',
    x: c * TILE_SIZE, y: r * TILE_SIZE,
    w: TILE_SIZE * 2, h: TILE_SIZE * 3,
    initX: c * TILE_SIZE, initY: r * TILE_SIZE,
  });
}

// ============================================================
// 火の玉（パックン・ファイアブロス共用）
// ============================================================
let FIREBALLS = [];
const FIREBALL_SIZE        = 18;    // 火の玉サイズ (px)
const FB_SPEED_PAKKUN      = 190;   // パックン直線速度 (px/s)
const FB_SPEED_FIRO_X      = 375;   // ファイアブロス水平速度（250×1.5）
const FB_SPEED_FIRO_Y      = -430;  // ファイアブロス初速（上向き）
const FB_BOUNCE_DECAY      = 0.55;  // バウンド後の速度比率
const FB_MAX_BOUNCES       = 4;     // 最大バウンド回数
const FB_SHOOT_RANGE       = 720;   // 攻撃射程 (px)
const FB_INTERVAL_PAKKUN   = 3.0;   // パックン発射間隔 (秒)
const FB_INTERVAL_FIREBROS = 2.0;   // ファイアブロス発射間隔 (秒)

// パックン土管アニメーション定数
const PAKKUN_DETECT_RANGE = 500;  // 感知距離 (px)
const PAKKUN_EMERGE_SPEED = 80;   // 出現/引っ込み速度 (px/s)
const PAKKUN_STAY_TIME    = 3.5;  // 出現中の滞在時間 (秒)

function spawnFireball(type, sx, sy, vx, vy) {
  FIREBALLS.push({ type, x: sx, y: sy, vx, vy,
    w: FIREBALL_SIZE, h: FIREBALL_SIZE,
    initVx: vx,  // 水平速度（常に一定・復元用）
    initVy: vy,  // バウンド時に使う基準垂直速度（高さ一定化）
    bounces: 0, alive: true });
}

(function buildMap() {
  // ── マップエディタ生成（wiimario-8-7.html 互換）──
  // ID: 0=空気 1=地面 2=氷 3=ブラックパックン
  // ID: 4=土管地面 5=土管天井 6=ハテナ 7=レンガ 8=コイン
  PIPES.length = 0;
  LIFTS.length = 0;
  ENEMIES.length = 0;
  STAR_COINS.length = 0;

  // ── スターコイン（map-editor の「★ スターコインだけコピー」でここに貼り付け）──
  // ↓ ここに addStarCoin(列, 行); を追加
  // ── スターコイン ──
  addStarCoin(96,6);
  addStarCoin(251,17);
  addStarCoin(368,18);

  // ── 土管（gPipe/cPipe）──
  gPipe(9,19,1);
  cPipe(21,1,1);
  gPipe(21,10,1);
  cPipe(33,3,1);
  gPipe(36,18,1);
  cPipe(49,3,1);
  gPipe(51,18,1);
  gPipe(59,18,1);
  cPipe(61,3,1);
  cPipe(77,11,1);
  cPipe(90,11,1);
  cPipe(101,6,1);
  gPipe(104,13,1);
  cPipe(155,7,1);
  gPipe(165,16,1);
  cPipe(188,6,1);
  gPipe(188,13,1);
  gPipe(216,19,1);
  gPipe(227,19,1);

// ── 旧エクスポート互換: MAPにタイルID14が残っていたらSTAR_COINSエンティティに変換 ──
// （新エクスポートは addStarCoin() を直接呼ぶので重複しない）
(function migrateStarCoinTiles() {
  // タイルID 14（旧フォールバック）または 17（エディタID）が残っていたらエンティティに変換
  const SC_IDS = new Set([14, 17]);
  for (let r = 0; r < MAP_ROWS; r++) {
    for (let c = 0; c < MAP_COLS; c++) {
      const id = MAP[r * MAP_COLS + c];
      if (!SC_IDS.has(id)) continue;
      // 上端・左端のセルのみ処理（2×2範囲の重複回避）
      const above = r > 0 ? MAP[(r - 1) * MAP_COLS + c] : 0;
      const left  = c > 0 ? MAP[r * MAP_COLS + c - 1]   : 0;
      if (SC_IDS.has(above) || SC_IDS.has(left)) continue;
      addStarCoin(c, r);
      // 該当セルを空気(0)に置換して drawTile での二重描画を防ぐ
      for (let dr = 0; dr < 2; dr++)
        for (let dc = 0; dc < 2; dc++)
          if (r + dr < MAP_ROWS && c + dc < MAP_COLS && SC_IDS.has(MAP[(r + dr) * MAP_COLS + c + dc]))
            MAP[(r + dr) * MAP_COLS + c + dc] = 0;
    }
  }
  if (STAR_COINS.length > 0) {
    console.log('[StarCoin] migrate完了:', STAR_COINS.length, '個のスターコインをエンティティ化しました');
  }
})();

const FW_COLORS = ['#FF4444','#FF8844','#FFFF44','#44FF88','#44FFFF','#8844FF','#FF44FF','#FFFFFF','#FFD700','#FF6699'];

function spawnFireworkRocket() {
  const x     = cameraX + 80 + Math.random() * (LW - 160);
  const color = FW_COLORS[Math.floor(Math.random() * FW_COLORS.length)];
  FIREWORKS.push({
    x, y: LH + 20,
    vx: (Math.random() - 0.5) * 90,
    vy: -(380 + Math.random() * 260),
    color,
    burstY: 80 + Math.random() * 280,
  });
}

function updateFireworks(dt) {
  for (let i = FIREWORKS.length - 1; i >= 0; i--) {
    const fw = FIREWORKS[i];
    fw.x += fw.vx * dt;
    fw.y += fw.vy * dt;
    fw.vy += 220 * dt;          // 重力
    if (fw.y <= fw.burstY) {
      // 爆発パーティクル（60個）
      for (let j = 0; j < 60; j++) {
        const angle = (Math.PI * 2 * j) / 60 + (Math.random() - 0.5) * 0.18;
        const spd   = 90 + Math.random() * 230;
        effects.push({ type:'particle',
          x: fw.x, y: fw.y,
          vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 30,
          r: 2 + Math.random() * 3,
          life: 0.55 + Math.random() * 0.55, maxLife: 1.1,
          color: fw.color });
      }
      // 中心キラキラ（20個・金）
      for (let j = 0; j < 20; j++) {
        const angle = Math.random() * Math.PI * 2;
        const spd   = 25 + Math.random() * 80;
        effects.push({ type:'particle',
          x: fw.x, y: fw.y,
          vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd,
          r: 1.5 + Math.random() * 2,
          life: 0.25 + Math.random() * 0.4, maxLife: 0.65,
          color: '#FFD700' });
      }
      FIREWORKS.splice(i, 1);
    }
  }
}

function drawFireworks() {
  ctx.save();
  for (const fw of FIREWORKS) {
    // 軌跡（小さい円）
    ctx.globalAlpha = 0.85;
    ctx.fillStyle   = fw.color;
    ctx.beginPath();
    ctx.arc(fw.x - cameraX, fw.y, 3.5, 0, Math.PI * 2);
    ctx.fill();
    // 尾
    ctx.globalAlpha = 0.25;
    ctx.fillStyle   = '#ffffff';
    ctx.beginPath();
    ctx.arc(fw.x - cameraX, fw.y + 10, 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}
function updateEffects(dt) {
  for (let i = effects.length - 1; i >= 0; i--) {
    const e = effects[i];
    e.life -= dt;
    if (e.life <= 0) { effects.splice(i, 1); continue; }
    if (e.type === 'particle') {
      e.x  += e.vx * dt;
      e.y  += e.vy * dt;
      e.vy += 550 * dt;
    }
  }
}

  // 内側：放射状に広がる光の粒（52個）
  for (let i = 0; i < 52; i++) {
    const angle = (Math.PI * 2 * i) / 52 + (Math.random() - 0.5) * 0.12;
    const spd   = 80 + Math.random() * 210;
    effects.push({
      type: 'particle',
      x: cx + (Math.random() - 0.5) * 8,
      y: cy + (Math.random() - 0.5) * 8,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 70,
      r: 1.8 + Math.random() * 2.2,
      life: 0.35 + Math.random() * 0.35, maxLife: 0.7,
      color: innerCol[Math.floor(Math.random() * innerCol.length)],
    });
  }
  // 外側：上に弧を描いて飛ぶ流れ星（32個）
  for (let i = 0; i < 32; i++) {
    const spread = (Math.random() - 0.5) * Math.PI * 1.5;
    const angle  = -Math.PI / 2 + spread;
    const spd    = 180 + Math.random() * 300;
    effects.push({
      type: 'particle',
      x: cx + (Math.random() - 0.5) * 14,
      y: cy + (Math.random() - 0.5) * 6,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: 1.5 + Math.random() * 3,
      life: 0.55 + Math.random() * 0.45, maxLife: 1.0,
      color: outerCol[Math.floor(Math.random() * outerCol.length)],
    });
  }
  // 二重ショックウェーブ（薄め）
  effects.push({ type:'shockwave', x:cx, y:cy, life:0.38, maxLife:0.38, maxR:120, color:'#ffd700', lineW:1.8 });
  effects.push({ type:'shockwave', x:cx, y:cy, life:0.26, maxLife:0.26, maxR:72,  color:'#fff5a0', lineW:1 });
}

function drawEffects() {
  ctx.save();
  for (const e of effects) {
    const t = e.life / e.maxLife;

    if (e.type === 'particle') {
      ctx.globalAlpha = Math.min(1, t * 2.0);
      ctx.fillStyle   = e.color;
      ctx.beginPath();
      ctx.arc(e.x - cameraX, e.y, e.r * (0.3 + t * 0.7), 0, Math.PI * 2);
      ctx.fill();

    } else if (e.type === 'shockwave') {
      const r = e.maxR * (1 - t);
      ctx.globalAlpha = t * t * 0.85;
      ctx.strokeStyle = e.color;
      ctx.lineWidth   = e.lineW;
      ctx.beginPath();
      ctx.arc(e.x - cameraX, e.y, r, 0, Math.PI * 2);
      ctx.stroke();

    }
  }
  ctx.globalAlpha  = 1;
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ============================================================
// タイル衝突判定
// ============================================================
function floorY() { return 17 * TILE_SIZE; } // ゴールエリア床Y（row17=850px）

function getTile(c, r) {
  if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) return 0;
  return MAP[r * MAP_COLS + c];
}
function isSolid(id) { return ((id >= 1 && id <= 13) && id !== 8) || id === 25 || id === 26 || id === 27; }
// ベース + オーバーレイ両方を確認（氷はどちらのレイヤーでも当たり判定あり）
function isSolidAt(c, r) {
  if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) return false;
  return isSolid(MAP[r * MAP_COLS + c]) || isSolid(MAP_OVERLAY[r * MAP_COLS + c]);
}

function resolveTileX() {
  const top = Math.floor(mario.y / TILE_SIZE);
  const bot = Math.floor((mario.y + mario.h - 1) / TILE_SIZE);
  if (mario.vx > 0) {
    const col = Math.floor((mario.x + mario.w) / TILE_SIZE);
    if (isSolidAt(col,top) || isSolidAt(col,bot)) {
      mario.x = col * TILE_SIZE - mario.w; mario.vx = 0;
    }
  } else if (mario.vx < 0) {
    const col = Math.floor(mario.x / TILE_SIZE);
    if (isSolidAt(col,top) || isSolidAt(col,bot)) {
      mario.x = (col + 1) * TILE_SIZE; mario.vx = 0;
    }
  }
}

function resolveTileY() {
  const left  = Math.floor(mario.x / TILE_SIZE);
  const right = Math.floor((mario.x + mario.w - 1) / TILE_SIZE);
  if (mario.vy >= 0) {
    const row = Math.floor((mario.y + mario.h) / TILE_SIZE);
    if (isSolidAt(left,row) || isSolidAt(right,row)) {
      mario.y = row * TILE_SIZE - mario.h; mario.vy = 0; mario.onGround = true;
    }
  } else {
    // 上昇中の頭突き判定
    const row = Math.floor(mario.y / TILE_SIZE);
    const hitL = isSolidAt(left, row);
    const hitR = isSolidAt(right, row);
    if (hitL || hitR) {
      mario.y  = (row + 1) * TILE_SIZE;
      mario.vy = 0;
      // ブロックヒット：重複呼び出し防止のためSetで管理
      const hitCols = new Set();
      if (hitL) hitCols.add(left);
      if (hitR) hitCols.add(right);
      for (const c of hitCols) hitBlockFromBelow(c, row);
    }
  }
}

function collectCoins() {
  const left  = Math.floor(mario.x / TILE_SIZE);
  const right = Math.floor((mario.x + mario.w - 1) / TILE_SIZE);
  const top   = Math.floor(mario.y / TILE_SIZE);
  const bot   = Math.floor((mario.y + mario.h - 1) / TILE_SIZE);
  for (let r=top; r<=bot; r++)
    for (let c=left; c<=right; c++)
      { const tid = getTile(c,r); if (tid === 8 || tid === 28) { MAP[r*MAP_COLS+c]=0; coins++; score+=200; } }
}

// ダメージ処理（fire→super→small→死亡）
// INVINCIBLE=true のときは呼ばれない想定
const MARIO_INVINCIBLE_DURATION = 2.0; // ダメージ後の無敵時間（秒）
function damageMario() {
  if (mario.invincibleTimer > 0) return; // まだ無敵中
  if (mario.state === 'fire') {
    growMario('super');
    mario.invincibleTimer = MARIO_INVINCIBLE_DURATION;
  } else if (mario.state === 'super') {
    growMario('small');
    mario.invincibleTimer = MARIO_INVINCIBLE_DURATION;
  } else {
    // small → 死亡
    gameState = 'gameover';
  }
}

// スターコイン収集（STAR_COINS 配列・2×2タイルエンティティ）
function collectStarCoins() {
  for (const sc of STAR_COINS) {
    if (sc.collected) continue;
    if (mario.x < sc.x + sc.w && mario.x + mario.w > sc.x &&
        mario.y < sc.y + sc.h && mario.y + mario.h > sc.y) {
      sc.collected = true;
      starCoins = Math.min(starCoins + 1, 3);
      score += 1000;
      spawnStarCoinEffect(sc.x + sc.w / 2, sc.y + sc.h / 2);
    }
  }
}

function spawnStarCoinEffect(cx, cy) {
  const colors = ['#FFD700', '#FFA500', '#FFFF00', '#ffffff'];
  for (let i = 0; i < 20; i++) {
    const angle = (Math.PI * 2 * i) / 20;
    const spd   = 90 + Math.random() * 160;
    effects.push({
      type: 'particle',
      x: cx, y: cy,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 80,
      r: 3 + Math.random() * 4,
      life: 0.5 + Math.random() * 0.35, maxLife: 0.85,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
  effects.push({ type: 'shockwave', x: cx, y: cy, life: 0.4, maxLife: 0.4, maxR: 55, color: '#FFD700', lineW: 2 });
}

// 敵を倒す共通処理（踏みつけ・火の玉）
function killEnemy(e, idx) {
  score += 200;
  spawnEnemyDeathEffect(e.x + e.w / 2, e.y + e.h / 2);
  ENEMIES.splice(idx, 1);
}

function spawnEnemyDeathEffect(cx, cy) {
  const colors = ['#ff6600', '#ffcc00', '#ffffff', '#ff2200'];
  for (let i = 0; i < 14; i++) {
    const angle = (Math.PI * 2 * i) / 14;
    const spd   = 70 + Math.random() * 130;
    effects.push({
      type: 'particle',
      x: cx, y: cy,
      vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 60,
      r: 3 + Math.random() * 4,
      life: 0.3 + Math.random() * 0.3, maxLife: 0.6,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
}

// ファイアブロス踏みつけ & パックン/ファイアブロス fire ヒット（update 内から呼ぶ）
function checkEnemyStompAndFireball() {
  // ── ファイアブロス 踏みつけ判定 ──
  if (mario.vy > 0) { // 落下中のみ
    for (let i = ENEMIES.length - 1; i >= 0; i--) {
      const e = ENEMIES[i];
      if (e.imgKey !== 'ファイアブロス') continue;
      const mBottom = mario.y + mario.h;
      const mLeft   = mario.x;
      const mRight  = mario.x + mario.w;
      // マリオの底辺がエネミーの上半分に乗った場合 = 踏みつけ成立
      if (mBottom >= e.y && mBottom <= e.y + e.h * 0.55 &&
          mRight > e.x + 4 && mLeft < e.x + e.w - 4) {
        killEnemy(e, i);
        mario.vy = JUMP_FORCE * 0.55; // バウンス
        return; // 同一フレームに複数処理しない
      }
    }
  }
}

// ============================================================
// ブロック破壊・アイテムシステム
// ============================================================

// ブロックを下から叩いたときの処理
function hitBlockFromBelow(c, r) {
  if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) return;
  const id = MAP[r * MAP_COLS + c];

  if (id === 6) {
    // ハテナブロック → アイテム生成・使用済みブロック(ID13)に変更
    MAP[r * MAP_COLS + c] = 13;
    const itemType = (mario.state === 'small') ? 'mushroom' : 'flower';
    spawnItem(itemType, c * TILE_SIZE, r * TILE_SIZE);
    score += 100;

  } else if (id === 7) {
    // レンガ → スーパー/ファイア時は破壊、通常は何もしない（バウンスのみ）
    if (mario.state === 'super' || mario.state === 'fire') {
      MAP[r * MAP_COLS + c] = 0;
      spawnBrickParticles(c * TILE_SIZE + TILE_SIZE / 2, r * TILE_SIZE + TILE_SIZE / 2);
      score += 50;
    }
  }
}

// レンガ破壊パーティクル
function spawnBrickParticles(cx, cy) {
  const colors = ['#c84818', '#a83010', '#ff6028', '#8B3210', '#e05020'];
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI * 2 * i) / 10 + (Math.random() - 0.5) * 0.4;
    const spd   = 100 + Math.random() * 180;
    effects.push({
      type: 'particle',
      x: cx + (Math.random() - 0.5) * 10,
      y: cy + (Math.random() - 0.5) * 5,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 120,
      r: 4 + Math.random() * 6,
      life: 0.4 + Math.random() * 0.35, maxLife: 0.75,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
}

// アイテムスポーン（ブロック上に向けて出現アニメーション）
function spawnItem(type, blockX, blockY) {
  ITEMS.push({
    type,
    x: blockX,
    y: blockY,                      // ブロックのy座標から出発
    vx: 0, vy: 0,
    w: TILE_SIZE, h: TILE_SIZE,
    active: true,
    spawning: true,
    spawnTargetY: blockY - TILE_SIZE, // 1タイル上が目標
  });
}

let ITEMS = [];

// アイテム更新（物理・収集）
function updateItems(dt) {
  for (let i = ITEMS.length - 1; i >= 0; i--) {
    const item = ITEMS[i];
    if (!item.active) { ITEMS.splice(i, 1); continue; }

    if (item.spawning) {
      // 出現アニメーション：上に向かって上昇
      item.y -= ITEM_SPAWN_SPEED * dt;
      if (item.y <= item.spawnTargetY) {
        item.y = item.spawnTargetY;
        item.spawning = false;
        if (item.type === 'mushroom') {
          item.vx = ITEM_MUSHROOM_SPEED;
        }
      }
      continue;
    }

    // アクティブ時の物理
    if (item.type === 'mushroom') {
      // 重力適用
      item.vy += GRAVITY * dt;
      item.vy  = Math.min(item.vy, MAX_FALL_SPEED);

      // 水平移動・壁衝突で反転
      item.x += item.vx * dt;
      const hRow = Math.floor((item.y + item.h * 0.5) / TILE_SIZE);
      if (item.vx > 0) {
        const col = Math.floor((item.x + item.w) / TILE_SIZE);
        if (isSolidAt(col, hRow)) { item.x = col * TILE_SIZE - item.w; item.vx = -ITEM_MUSHROOM_SPEED; }
      } else if (item.vx < 0) {
        const col = Math.floor(item.x / TILE_SIZE);
        if (isSolidAt(col, hRow)) { item.x = (col + 1) * TILE_SIZE; item.vx = ITEM_MUSHROOM_SPEED; }
      }

      // 垂直移動・床衝突
      item.y += item.vy * dt;
      const lCol = Math.floor(item.x / TILE_SIZE);
      const rCol = Math.floor((item.x + item.w - 1) / TILE_SIZE);
      if (item.vy >= 0) {
        const bRow = Math.floor((item.y + item.h) / TILE_SIZE);
        if (isSolidAt(lCol, bRow) || isSolidAt(rCol, bRow)) {
          item.y  = bRow * TILE_SIZE - item.h;
          item.vy = 0;
        }
      }
    }
    // ファイアフラワーは出現後その場に留まる（物理なし）
  }
}

// アイテム収集→マリオ状態変化
function collectItems() {
  for (const item of ITEMS) {
    if (!item.active || item.spawning) continue;
    if (mario.x < item.x + item.w && mario.x + mario.w > item.x &&
        mario.y < item.y + item.h && mario.y + mario.h > item.y) {
      item.active = false;
      score += 1000;
      if (item.type === 'mushroom' && mario.state === 'small') {
        growMario('super');
      } else if (item.type === 'flower' && mario.state === 'super') {
        growMario('fire');
      } else if (item.type === 'flower' && mario.state === 'small') {
        growMario('super'); // スモール時のフラワーはスーパーに
      }
    }
  }
}

// マリオの状態変化（サイズ調整）
function growMario(newState) {
  const oldH = mario.h;
  mario.state = newState;
  mario.h = (newState === 'small') ? MARIO_H : MARIO_SUPER_H;
  if (mario.h > oldH) {
    mario.y -= (mario.h - oldH); // 成長: 上にずらして床抜け防止
  } else if (mario.h < oldH) {
    mario.y += (oldH - mario.h); // 縮小: 下にずらして足元位置を固定
  }
}

// アイテム描画
function drawItems() {
  for (const item of ITEMS) {
    if (!item.active) continue;
    const sx = item.x - cameraX;
    if (sx + item.w < 0 || sx > LW) continue;

    ctx.save();
    const key = item.type === 'mushroom' ? 'キノコ' : 'ファイアフラワー';
    if (imgReady(key)) {
      ctx.drawImage(IMGS[key], sx, item.y, item.w, item.h);
    } else {
      // フォールバック
      ctx.fillStyle   = item.type === 'mushroom' ? '#ff2200' : '#ff8800';
      ctx.strokeStyle = '#000';
      ctx.lineWidth   = 2;
      ctx.fillRect(sx, item.y, item.w, item.h);
      ctx.strokeRect(sx, item.y, item.w, item.h);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(item.type === 'mushroom' ? 'M' : 'F', sx + item.w/2, item.y + item.h/2);
    }
    ctx.restore();
  }
}

// スターコイン描画（2×2タイルサイズ）
function drawStarCoins() {
  for (const sc of STAR_COINS) {
    if (sc.collected) continue;
    const sx = sc.x - cameraX;
    if (sx + sc.w < 0 || sx > LW) continue;
    ctx.save();
    if (imgReady('スターコイン')) {
      ctx.drawImage(IMGS['スターコイン'], sx, sc.y, sc.w, sc.h);
    } else {
      // 星形フォールバック（画像なし時）
      const cx = sx + sc.w / 2, cy = sc.y + sc.h / 2;
      const ro = sc.w / 2 - 6, ri = ro * 0.42;
      ctx.fillStyle = '#FFD700'; ctx.strokeStyle = '#c8960c'; ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a1 = (Math.PI * 2 * i / 5) - Math.PI / 2;
        const a2 = (Math.PI * 2 * (i + 0.5) / 5) - Math.PI / 2;
        const px1 = cx + Math.cos(a1) * ro, py1 = cy + Math.sin(a1) * ro;
        const px2 = cx + Math.cos(a2) * ri, py2 = cy + Math.sin(a2) * ri;
        if (i === 0) ctx.moveTo(px1, py1); else ctx.lineTo(px1, py1);
        ctx.lineTo(px2, py2);
      }
      ctx.closePath(); ctx.fill(); ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.beginPath();
      ctx.arc(cx - ro * 0.2, cy - ro * 0.3, ro * 0.22, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ============================================================
// ゲーム初期化
// ============================================================
function startGame() {
  mario.x           = 200;
  mario.y           = floorY() - MARIO_H;
  mario.vx          = 0;
  mario.vy          = 0;
  mario.w           = MARIO_W;
  mario.h           = MARIO_H;
  mario.dir         = 1;
  mario.onGround    = false;
  mario.crouching   = false;
  mario.jumpHeld    = false;
  mario.jumpStage   = 0;
  mario.chainTimer  = 0;
  mario.prevOnGround = false;
  mario.ridingLift   = null;
  mario.state           = 'small';
  mario.fireCooldown    = 0;
  mario.invincibleTimer = 0;

  effects     = [];
  FIREBALLS   = [];
  ITEMS       = [];
  starCoins   = 0;
  STAR_COINS  = _starCoinsInit.map(s => Object.assign({}, s));
  LIFTS       = _liftsInit.map(l => Object.assign({}, l));
  ENEMIES     = _enemiesInit.map(e => Object.assign({}, e));
  cameraX  = 0;
  lives    = 108;
  coins      = 0;
  score      = 0;
  timer      = 300;
  timerAccum = 0;
  goalPhase       = 'none';
  goalTimer        = 0;
  goalTopBonus     = false;
  goalFireworkTimer = 0;
  FIREWORKS.length  = 0;
  gameState  = 'playing';
}

// ============================================================
// ゴールシーケンス
// ============================================================
function startGoal() {
  goalPhase        = 'slide';
  goalTimer        = 0;
  mario.vx         = 0;
  mario.vy         = 0;
  mario.jumpHeld   = false;
  mario.jumpStage  = 0;
  mario.chainTimer = 0;
  mario.crouching  = false;
  mario.h          = MARIO_H;
  mario.dir        = 1;
  // ポール中心にスナップ
  mario.x = GOAL_X - mario.w / 2;
  // ポール最上段判定（poleTop ≈ floorY() - TILE_UNIT*24 = 850-720 = 130）
  const poleTop    = floorY() - TILE_UNIT * 24;
  goalTopBonus     = mario.y <= poleTop + 90;
  goalFireworkTimer = 0.05;   // 即座に1発目を打ち上げる
  FIREWORKS.length  = 0;
}

function updateGoal(dt) {
  const fy = floorY();

  // 花火更新（最上段ボーナス中・全フェーズ共通）
  if (goalTopBonus) {
    goalFireworkTimer -= dt;
    if (goalFireworkTimer <= 0) {
      spawnFireworkRocket();
      goalFireworkTimer = 0.32 + Math.random() * 0.35;
    }
    updateFireworks(dt);
  }

  if (goalPhase === 'slide') {
    // ポールをするする滑り降りる
    mario.y += GOAL_SLIDE_SPEED * dt;
    if (mario.y + mario.h >= fy) {
      mario.y   = fy - mario.h;
      mario.onGround = true;
      goalPhase = 'walk';
    }

  } else if (goalPhase === 'walk') {
    // 右へテコテコ歩く
    mario.x  += GOAL_WALK_SPEED * dt;
    mario.dir = 1;
    mario.onGround = true;
    // 家のドア前に到達
    if (mario.x >= HOUSE_X + 25) {
      goalPhase = 'enter';
      goalTimer = GOAL_ENTER_DURATION;
    }

  } else if (goalPhase === 'enter') {
    // 家に入りながらフェードアウト
    mario.x  += 30 * dt;
    goalTimer -= dt;
    if (goalTimer <= 0) {
      gameState = 'clear';
      goalPhase = 'none';
    }
  }
}

// ============================================================
// UPDATE
// ============================================================
function update(dt) {
  if (gameState !== 'playing') return;

  // ゴールシーケンス中は専用ロジック
  if (goalPhase !== 'none') {
    updateGoal(dt);
    updateEffects(dt);
    // ゴール演出中は右クランプを外す（家がSTAGE_WIDTH外にあるため）
    cameraX = Math.max(0, mario.x - LW / 2);
    return;
  }

  // タイマー
  timerAccum += dt;
  if (timerAccum >= 1) {
    timerAccum -= 1;
    timer = Math.max(0, timer - 1);
    if (timer === 0) { gameState = 'gameover'; return; }
  }

  // ダメージ後の無敵タイマー
  if (mario.invincibleTimer > 0) mario.invincibleTimer -= dt;

  // しゃがみ（状態ごとに高さが変わる）
  mario.crouching = !!(keys['KeyS'] && mario.onGround);
  if (mario.state === 'small') {
    mario.h = mario.crouching ? MARIO_CROUCH_H : MARIO_H;
  } else {
    // スーパー/ファイア: 通常2タイル・しゃがみ1タイル
    mario.h = mario.crouching ? MARIO_H : MARIO_SUPER_H;
  }

  // 水平移動
  const isDashing = !!(keys['ShiftLeft'] || keys['ShiftRight']);
  const spd = isDashing ? RUN_SPEED : MOVE_SPEED;
  mario.vx = 0;
  if (!mario.crouching) {
    if (keys['KeyD']) { mario.vx =  spd; mario.dir =  1; }
    if (keys['KeyA']) { mario.vx = -spd; mario.dir = -1; }
  }

  // 3段ジャンプ：連鎖受付タイマー（着地中のみカウントダウン）
  if (mario.onGround && mario.chainTimer > 0) {
    mario.chainTimer -= dt;
    if (mario.chainTimer <= 0) {
      mario.chainTimer = 0;
      mario.jumpStage  = 0;
    }
  }

  // ジャンプ
  if (keys['Space'] && !mario.crouching && (infiniteJump || mario.onGround)) {
    let jf;
    if (isDashing && mario.chainTimer > 0 && mario.jumpStage >= 1 && mario.jumpStage < 3) {
      mario.jumpStage++;
      if (mario.jumpStage === 2) {
        jf = JUMP_FORCE_2;
        spawnDoubleEffect(mario.x + mario.w / 2, mario.y + mario.h);
      } else {
        jf = JUMP_FORCE_3;
        spawnTripleEffect(mario.x + mario.w / 2, mario.y + mario.h);
      }
    } else {
      mario.jumpStage = isDashing ? 1 : 0;
      jf = isDashing ? JUMP_FORCE_1 : JUMP_FORCE;
    }
    mario.vy         = jf;
    mario.onGround   = false;
    mario.jumpHeld   = true;
    mario.chainTimer = 0;
  }
  if (!keys['Space']) mario.jumpHeld = false;

  // 重力（可変ジャンプ：上昇＋押しっぱなしで40%に）
  if (mario.jumpHeld && mario.vy < 0) {
    mario.vy += GRAVITY * 0.7 * dt;
  } else {
    mario.vy += GRAVITY * dt;
  }
  mario.vy = Math.min(mario.vy, MAX_FALL_SPEED);

  // 位置更新・衝突解決（X→Y順）
  updateLifts(dt);

  mario.x += mario.vx * dt;
  resolveTileX();

  const wasOnGround = mario.onGround;
  mario.onGround = false;
  mario.y += mario.vy * dt;
  resolveTileY();
  resolveLifts(dt);
  collectCoins();
  collectStarCoins();
  collectItems();
  checkEnemyStompAndFireball();
  checkEnemyCollision();
  checkBlackPakkunCollision();
  if (gameState !== 'playing') return;
  updatePakkunPipe(dt);
  updateEnemies(dt);
  updateEnemyMovement(dt);
  updateFireballs(dt);
  updateItems(dt);
  if (gameState !== 'playing') return;

  // ファイアマリオ：Rキーで火の玉発射（ファイアブロスと同じ挙動）
  if (mario.state === 'fire') {
    if (mario.fireCooldown > 0) mario.fireCooldown -= dt;
    if (keys['KeyR'] && mario.fireCooldown <= 0) {
      mario.fireCooldown = MARIO_FIRE_RATE;
      const fbX = mario.dir === 1
        ? mario.x + mario.w
        : mario.x - FIREBALL_SIZE;
      const fbY = mario.y + mario.h / 2 - FIREBALL_SIZE / 2;
      spawnFireball('mario_fire', fbX, fbY,
        FB_SPEED_FIRO_X * mario.dir, FB_SPEED_FIRO_Y);
    }
  }

  if (mario.onGround && !wasOnGround) {
    if (mario.jumpStage === 3) {
      mario.jumpStage  = 0;
      mario.chainTimer = 0;
    } else if (mario.jumpStage >= 1) {
      mario.chainTimer = JUMP_CHAIN_WINDOW;
    }
  }

  // エフェクト更新
  updateEffects(dt);

  // 落下死
  if (mario.y > LH + 200) { gameState = 'gameover'; return; }

  // ステージ端クランプ
  if (mario.x < 0)                     { mario.x = 0;                     mario.vx = 0; }
  if (mario.x + mario.w > STAGE_WIDTH) { mario.x = STAGE_WIDTH - mario.w; mario.vx = 0; }

  // ゴールポール接触判定
  if (mario.x + mario.w >= GOAL_X - 3 && mario.x < GOAL_X + 9) {
    startGoal();
    return;
  }

  // カメラ追従
  const targetX = mario.x - LW / 2;
  cameraX = Math.max(0, Math.min(targetX, STAGE_WIDTH - LW));
}

// ============================================================
// DRAW
// ============================================================
function draw() {
  ctx.clearRect(0, 0, LW, LH);

  if (gameState === 'title') { drawTitle(); return; }

  drawBackground();
  drawPakkunEnemies();  // パックンをタイル・土管の下レイヤーで描画
  drawTiles();
  drawOverlayTiles();
  drawPipes();
  drawLifts();
  drawItems();          // アイテム（キノコ・ファイアフラワー）
  drawStarCoins();      // スターコイン（2×2タイル）
  drawOtherEnemies();   // ファイアブロスなどを土管の上レイヤーで描画
  drawFireballs();
  drawGoalPole();
  drawFireworks();
  drawMario();
  drawEffects();
  drawHUD();

  if (gameState === 'gameover') drawOverlay('GAME OVER',    '#fff',    '▶  Enter キーでタイトルへ');
  if (gameState === 'clear')    drawOverlay('STAGE CLEAR!', '#ffee00', '▶  Enter キーでタイトルへ');
}

// ---- グリーンブロブキャラ描画 ----
function drawGreenBlob(cx, cy, s) {
  ctx.save();
  ctx.translate(cx, cy);

  // 左耳
  ctx.fillStyle   = '#52A840';
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = s * 0.045;
  ctx.lineJoin    = 'round';
  ctx.beginPath();
  ctx.ellipse(-s * 0.41, -s * 0.14, s * 0.17, s * 0.21, -0.28, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // 右耳
  ctx.beginPath();
  ctx.ellipse( s * 0.41, -s * 0.14, s * 0.17, s * 0.21,  0.28, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();
  // 耳インナー
  ctx.fillStyle   = '#3A8830';
  ctx.strokeStyle = 'transparent';
  ctx.beginPath();
  ctx.ellipse(-s * 0.41, -s * 0.11, s * 0.09, s * 0.13, -0.28, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse( s * 0.41, -s * 0.11, s * 0.09, s * 0.13,  0.28, 0, Math.PI * 2);
  ctx.fill();

  // 本体
  ctx.fillStyle   = '#6CC84E';
  ctx.strokeStyle = '#111';
  ctx.lineWidth   = s * 0.045;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 0.49, s * 0.40, 0, 0, Math.PI * 2);
  ctx.fill(); ctx.stroke();

  // 目（左）
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.ellipse(-s * 0.145, -s * 0.055, s * 0.065, s * 0.065, 0, 0, Math.PI * 2);
  ctx.fill();
  // 目（右）
  ctx.beginPath();
  ctx.ellipse( s * 0.145, -s * 0.055, s * 0.065, s * 0.065, 0, 0, Math.PI * 2);
  ctx.fill();
  // ハイライト
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-s*0.175, -s*0.085, s*0.024, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( s*0.115, -s*0.085, s*0.024, 0, Math.PI*2); ctx.fill();

  // 鼻
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-s*0.042, s*0.048, s*0.030, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( s*0.042, s*0.048, s*0.030, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ---- 背景 ----
function drawBackground() {
  if (imgReady('背景')) {
    // 横方向は視差スクロール（背景はゆっくり）、縦は画面全体に引き伸ばす
    const img = IMGS['背景'];
    const parallax = (cameraX * 0.3) % LW;
    ctx.drawImage(img, -parallax,      0, LW, LH);
    ctx.drawImage(img, LW - parallax,  0, LW, LH);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, LH);
    grad.addColorStop(0, '#0b0e2b');
    grad.addColorStop(1, '#1a3a6e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, LW, LH);
  }
}

// ---- タイル描画 ----
function drawTile(sx, sy, id) {
  const T = TILE_SIZE;
  ctx.save();
  switch (id) {
    case 1: { // 地面
      const key = '地面上';
      if (imgReady(key)) { ctx.drawImage(IMGS[key], sx, sy, T, T); }
      else { ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.fillRect(sx,sy,T,T); ctx.strokeRect(sx,sy,T,T); }
      break;
    }
    case 2: // 氷ブロック（コード生成・スプライトなし）
      ctx.fillStyle='#a8d8f0'; ctx.fillRect(sx,sy,T,T);
      ctx.strokeStyle='#5bb8e8'; ctx.lineWidth=2; ctx.strokeRect(sx,sy,T,T);
      ctx.strokeStyle='rgba(255,255,255,0.6)'; ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(sx+5,sy+T/2); ctx.lineTo(sx+T-5,sy+T/2);
      ctx.moveTo(sx+T/2,sy+5); ctx.lineTo(sx+T/2,sy+T-5);
      ctx.stroke();
      break;
    case 3: { // ブラックパックン
      if (imgReady('ブラックパックン')) {
        ctx.drawImage(IMGS['ブラックパックン'], sx, sy, T, T);
        // ※ 水色ティントは廃止（氷オーバーレイは drawOverlayTiles で別描画）
      } else {
        ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
        ctx.fillRect(sx,sy,T,T); ctx.strokeRect(sx,sy,T,T);
        ctx.fillStyle='#000'; ctx.font="bold 18px 'Chlorinap', monospace";
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('P',sx+T/2,sy+T/2);
      }
      break;
    }
    case 4: case 5: // 土管はdrawPipes()で描画するためスキップ
      break;
    case 6: { // ハテナブロック
      if (imgReady('ハテナブロック')) { ctx.drawImage(IMGS['ハテナブロック'], sx, sy, T, T); }
      else {
        ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
        ctx.fillRect(sx,sy,T,T); ctx.strokeRect(sx,sy,T,T);
        ctx.fillStyle='#000'; ctx.font="bold 22px 'Chlorinap', monospace";
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('?',sx+T/2,sy+T/2);
      }
      break;
    }
    case 7: { // レンガ
      if (imgReady('レンガ')) { ctx.drawImage(IMGS['レンガ'], sx, sy, T, T); }
      else {
        ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
        ctx.fillRect(sx,sy,T,T); ctx.strokeRect(sx,sy,T,T);
      }
      break;
    }
    case 8: { // コイン
      if (imgReady('コイン')) { ctx.drawImage(IMGS['コイン'], sx, sy, T, T); }
      else {
        ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(sx+T/2,sy+T/2,T/2-5,0,Math.PI*2);
        ctx.fill(); ctx.stroke();
      }
      break;
    }
    case 9: { // 地面上上（地面上.jpg を上下反転）
      if (imgReady('地面上')) {
        ctx.translate(sx + T/2, sy + T/2); ctx.scale(1, -1);
        ctx.drawImage(IMGS['地面上'], -T/2, -T/2, T, T);
      } else { ctx.fillStyle='#8B4513'; ctx.fillRect(sx,sy,T,T); }
      break;
    }
    case 10: { // 地面中上（地面中.jpg を上下反転）
      if (imgReady('地面中')) {
        ctx.translate(sx + T/2, sy + T/2); ctx.scale(1, -1);
        ctx.drawImage(IMGS['地面中'], -T/2, -T/2, T, T);
      } else { ctx.fillStyle='#7B3511'; ctx.fillRect(sx,sy,T,T); }
      break;
    }
    case 12: { // 地面中
      if (imgReady('地面中')) { ctx.drawImage(IMGS['地面中'], sx, sy, T, T); }
      else { ctx.fillStyle='#7B3511'; ctx.fillRect(sx,sy,T,T); }
      break;
    }
    case 13: { // 使用済みブロック（叩き済みのハテナブロック）
      ctx.fillStyle='#888888'; ctx.strokeStyle='#555555'; ctx.lineWidth=2;
      ctx.fillRect(sx,sy,T,T); ctx.strokeRect(sx,sy,T,T);
      break;
    }
    case 25: { // 地面火山上
      if (imgReady('地面火山上')) { ctx.drawImage(IMGS['地面火山上'], sx, sy, T, T); }
      else { ctx.fillStyle='#5c2000'; ctx.strokeStyle='#000'; ctx.lineWidth=2; ctx.fillRect(sx,sy,T,T); ctx.strokeRect(sx,sy,T,T); }
      break;
    }
    case 26: { // 地面火山中
      if (imgReady('地面火山中')) { ctx.drawImage(IMGS['地面火山中'], sx, sy, T, T); }
      else { ctx.fillStyle='#3a1500'; ctx.fillRect(sx,sy,T,T); }
      break;
    }
    case 27: { // ハテナブロック赤
      if (imgReady('ハテナブロック赤')) { ctx.drawImage(IMGS['ハテナブロック赤'], sx, sy, T, T); }
      else {
        ctx.fillStyle='#fff'; ctx.strokeStyle='#cc0000'; ctx.lineWidth=2;
        ctx.fillRect(sx,sy,T,T); ctx.strokeRect(sx,sy,T,T);
        ctx.fillStyle='#cc0000'; ctx.font="bold 22px 'Chlorinap', monospace";
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('?',sx+T/2,sy+T/2);
      }
      break;
    }
    case 28: { // コイン赤
      if (imgReady('コイン赤')) { ctx.drawImage(IMGS['コイン赤'], sx, sy, T, T); }
      else {
        ctx.fillStyle='#fff'; ctx.strokeStyle='#cc0000'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(sx+T/2,sy+T/2,T/2-5,0,Math.PI*2);
        ctx.fill(); ctx.stroke();
      }
      break;
    }
    case 14: { // スターコイン
      if (imgReady('スターコイン')) {
        ctx.drawImage(IMGS['スターコイン'], sx, sy, T, T);
        break;
      }
      // フォールバック（画像なし時）: 金色の星
      const cx = sx + T/2, cy = sy + T/2;
      const ro = T/2 - 5, ri = ro * 0.42;
      ctx.fillStyle = '#FFD700';
      ctx.strokeStyle = '#c8960c';
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a1 = (Math.PI * 2 * i / 5) - Math.PI / 2;
        const a2 = (Math.PI * 2 * (i + 0.5) / 5) - Math.PI / 2;
        const px1 = cx + Math.cos(a1) * ro, py1 = cy + Math.sin(a1) * ro;
        const px2 = cx + Math.cos(a2) * ri, py2 = cy + Math.sin(a2) * ri;
        if (i === 0) ctx.moveTo(px1, py1); else ctx.lineTo(px1, py1);
        ctx.lineTo(px2, py2);
      }
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // 白いハイライト
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.beginPath();
      ctx.arc(cx - ro*0.22, cy - ro*0.32, ro*0.24, 0, Math.PI*2);
      ctx.fill();
      break;
    }
  }
  ctx.restore();
}

// ============================================================
// リフト
// ============================================================
function updateLifts(dt) {
  for (const l of LIFTS) {
    const prevY = l.y;
    l.y += l.speed * l.dir * dt;
    if (l.y > l.initY + l.rangeD) { l.y = l.initY + l.rangeD; l.dir = -1; }
    if (l.y < l.initY - l.rangeU) { l.y = l.initY - l.rangeU; l.dir =  1; }
    const dy = l.y - prevY;

    // 乗っているマリオを一緒に動かす
    if (mario.ridingLift === l) mario.y += dy;

    // リフト上の敵を一緒に動かす（直前フレームでリフト上面にいたエンティティ）
    for (const e of ENEMIES) {
      if (Math.abs((e.y + e.h) - prevY) <= 4 &&
          e.x < l.x + l.w - 2 && e.x + e.w > l.x + 2) {
        e.y += dy;
      }
    }
  }
}

function resolveLifts(dt) {
  mario.ridingLift = null; // 毎フレームリセット（updateLiftsの後に再判定）
  for (const l of LIFTS) {
    const mL = mario.x,        mR = mario.x + mario.w;
    const lL = l.x + 2,        lR = l.x + l.w - 2;
    if (mR <= lL || mL >= lR) continue; // 水平方向に重なっていない

    const mB = mario.y + mario.h;
    const mT = mario.y;
    const lT = l.y;
    const lB = l.y + l.h;

    // 上面着地（落下中 or リフトが上昇して追いついた場合）
    if (mB >= lT - 4 && mB <= lT + TILE_SIZE * 0.8 && mT < lT + 4) {
      mario.y        = lT - mario.h;
      mario.vy       = 0;
      mario.onGround = true;
      mario.ridingLift = l;  // 乗っているリフトを記録
    }
    // 下面頭突き（ジャンプ中）
    if (mario.vy < 0 && mT <= lB + 2 && mT >= lB - TILE_SIZE * 0.7 && mB > lB) {
      mario.y  = lB;
      mario.vy = 0;
    }
  }
}

function drawLifts() {
  for (const l of LIFTS) {
    const sx = l.x - cameraX;
    if (sx + l.w < 0 || sx > LW) continue;
    if (imgReady('リフト')) {
      ctx.drawImage(IMGS['リフト'], sx, l.y, l.w, l.h);
    } else {
      ctx.fillStyle = '#8B6914'; ctx.fillRect(sx, l.y, l.w, l.h);
      ctx.strokeStyle = '#5a4008'; ctx.lineWidth = 2; ctx.strokeRect(sx, l.y, l.w, l.h);
    }
  }
}

// ============================================================
// 敵
// ============================================================
let INVINCIBLE   = true; // ボタンで切替可能
let infiniteJump = true; // ボタンで切替可能
function checkEnemyCollision() {
  if (INVINCIBLE) return;
  for (const e of ENEMIES) {
    const isPakkun = e.imgKey === 'パックン' || e.imgKey === 'パックン上';
    if (isPakkun && e.pipeState !== 'emerged') continue;
    if (mario.x < e.x + e.w && mario.x + mario.w > e.x &&
        mario.y < e.y + e.h && mario.y + mario.h > e.y) {
      damageMario();
      return;
    }
  }
}

// ブラックパックン（MAP ID=3）接触ダメージ（氷オーバーレイなし＝保護なし）
function checkBlackPakkunCollision() {
  if (INVINCIBLE) return;
  const left  = Math.floor(mario.x / TILE_SIZE);
  const right = Math.floor((mario.x + mario.w - 1) / TILE_SIZE);
  const top   = Math.floor(mario.y / TILE_SIZE);
  const bot   = Math.floor((mario.y + mario.h - 1) / TILE_SIZE);
  for (let r = top; r <= bot; r++) {
    for (let c = left; c <= right; c++) {
      if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) continue;
      // 氷オーバーレイ(2)があれば保護されて安全
      if (MAP[r * MAP_COLS + c] === 3 && MAP_OVERLAY[r * MAP_COLS + c] !== 2) {
        damageMario();
        return;
      }
    }
  }
}

// パックン専用描画（タイル・土管の下レイヤー）
// スプライトを物理的に上下移動させ、土管/タイルが上から被さることで「出てくる」演出
function drawPakkunEnemies() {
  const marioCenter = mario.x + mario.w / 2;
  for (const e of ENEMIES) {
    if (e.imgKey !== 'パックン' && e.imgKey !== 'パックン上') continue;
    const sx = e.x - cameraX;
    if (sx + e.w < 0 || sx > LW) continue;
    // idle = 完全に土管内に隠れている → 描画スキップ
    if (!e.pipeState || e.pipeState === 'idle') continue;

    const offsetY = (e.renderOffsetY !== undefined)
      ? e.renderOffsetY
      : (e.imgKey === 'パックン' ? e.h : -e.h);
    const renderY = e.y + offsetY;
    const flipX   = marioCenter > e.x + e.w / 2;
    const key     = e.imgKey;

    ctx.save();
    if (key && imgReady(key)) {
      if (flipX) {
        ctx.translate(sx + e.w / 2, renderY + e.h / 2);
        ctx.scale(-1, 1);
        ctx.drawImage(IMGS[key], -e.w / 2, -e.h / 2, e.w, e.h);
      } else {
        ctx.drawImage(IMGS[key], sx, renderY, e.w, e.h);
      }
    } else {
      ctx.fillStyle = '#ff4400'; ctx.fillRect(sx, renderY, e.w, e.h);
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(sx, renderY, e.w, e.h);
    }
    ctx.restore();
  }
}

// ファイアブロスなど（土管の上レイヤー）
function drawOtherEnemies() {
  const marioCenter = mario.x + mario.w / 2;
  for (const e of ENEMIES) {
    if (e.imgKey === 'パックン' || e.imgKey === 'パックン上') continue;
    const sx = e.x - cameraX;
    if (sx + e.w < 0 || sx > LW) continue;
    const flipX = marioCenter > e.x + e.w / 2;
    const key   = e.imgKey;
    ctx.save();
    if (key && imgReady(key)) {
      if (flipX) {
        ctx.translate(sx + e.w / 2, e.y + e.h / 2);
        ctx.scale(-1, 1);
        ctx.drawImage(IMGS[key], -e.w / 2, -e.h / 2, e.w, e.h);
      } else {
        ctx.drawImage(IMGS[key], sx, e.y, e.w, e.h);
      }
    } else {
      ctx.fillStyle = '#ff4400'; ctx.fillRect(sx, e.y, e.w, e.h);
      ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.strokeRect(sx, e.y, e.w, e.h);
    }
    ctx.restore();
  }
}

// ============================================================
// 火の玉 ロジック
// ============================================================

// タイル衝突（氷ブロック破壊・ファイアブロスバウンド込み）
function fireballTileCollision(fb) {
  const corners = [
    [fb.x,          fb.y         ],
    [fb.x + fb.w-1, fb.y         ],
    [fb.x,          fb.y + fb.h-1],
    [fb.x + fb.w-1, fb.y + fb.h-1],
  ];

  // ── ステップ1: 氷ブロック（オーバーレイ）を全コーナーで破壊チェック ──
  // iceFloorRow: 底辺コーナーで落下中に氷が壊れた行（下記ステップ3のバウンドに使用）
  let iceFloorRow = -1;
  for (const [px, py] of corners) {
    const c = Math.floor(px / TILE_SIZE);
    const r = Math.floor(py / TILE_SIZE);
    if (c >= 0 && c < MAP_COLS && r >= 0 && r < MAP_ROWS &&
        MAP_OVERLAY[r * MAP_COLS + c] === 2) {
      MAP_OVERLAY[r * MAP_COLS + c] = 0; // 氷を破壊
      if (fb.type === 'pakkun') { fb.alive = false; return true; }
      // firebros: 底辺コーナー(py が下半分)かつ落下中なら行番号を記録
      if (py > fb.y + fb.h * 0.5 && fb.vy >= 0) iceFloorRow = r;
    }
  }

  // ── ステップ2: パックン → ソリッドタイルで消える ──
  if (fb.type === 'pakkun') {
    for (const [px, py] of corners) {
      const c = Math.floor(px / TILE_SIZE);
      const r = Math.floor(py / TILE_SIZE);
      if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) { fb.alive = false; return true; }
      if (isSolid(MAP[r * MAP_COLS + c])) { fb.alive = false; return true; }
    }
    return false;
  }

  // ── ステップ2.5: マリオ火の玉 → 横方向のソリッドタイルに当たると消滅 ──
  if (fb.type === 'mario_fire') {
    const midRow = Math.floor((fb.y + fb.h / 2) / TILE_SIZE);
    if (midRow >= 0 && midRow < MAP_ROWS) {
      if (fb.vx > 0) { // 右向き
        const rCol = Math.floor((fb.x + fb.w) / TILE_SIZE);
        if (rCol >= 0 && rCol < MAP_COLS &&
            (isSolid(MAP[midRow * MAP_COLS + rCol]) || isSolid(MAP_OVERLAY[midRow * MAP_COLS + rCol]))) {
          fb.alive = false; return true;
        }
      } else { // 左向き
        const lCol = Math.floor(fb.x / TILE_SIZE);
        if (lCol >= 0 && lCol < MAP_COLS &&
            (isSolid(MAP[midRow * MAP_COLS + lCol]) || isSolid(MAP_OVERLAY[midRow * MAP_COLS + lCol]))) {
          fb.alive = false; return true;
        }
      }
    }
  }

  // ── ステップ3: firebros/mario_fire → 床/天井でバウンド（vx は不変）──
  const cL = Math.floor(fb.x / TILE_SIZE);
  const cR = Math.floor((fb.x + fb.w-1) / TILE_SIZE);

  // ── ステップ4（pakkun は既にリターン済み）: パックン以外 → ソリッドで消える追加チェック ──
  if (fb.type !== 'firebros' && fb.type !== 'mario_fire') {
    for (const [px, py] of corners) {
      const c = Math.floor(px / TILE_SIZE);
      const r = Math.floor(py / TILE_SIZE);
      if (c < 0 || c >= MAP_COLS || r < 0 || r >= MAP_ROWS) { fb.alive = false; return true; }
      if (isSolid(MAP[r * MAP_COLS + c])) { fb.alive = false; return true; }
    }
    return false;
  }

  // 下面バウンド（落下中 or 静止）→ initVy で跳ね返り（高さ一定）
  // 「氷を壊した行」も床として扱う（下のタイルがコイン等の非ソリッドでも跳ねる）
  if (fb.vy >= 0) {
    const bRow = Math.floor((fb.y + fb.h) / TILE_SIZE);
    let floorHit = (iceFloorRow >= 0); // 氷破壊 = 床扱い
    if (!floorHit) {
      for (const col of [cL, cR]) {
        if (col >= 0 && col < MAP_COLS && bRow >= 0 && bRow < MAP_ROWS &&
            isSolid(MAP[bRow * MAP_COLS + col])) {
          floorHit = true; break;
        }
      }
    }
    if (floorHit) {
      const snapRow = (iceFloorRow >= 0) ? iceFloorRow : bRow;
      fb.y  = snapRow * TILE_SIZE - fb.h;
      fb.vy = fb.initVy; // 初期上方速度で跳ね返る（毎回同じ高さ）
      return false;
    }
  }

  // 上面バウンド（上昇中に天井衝突）
  if (fb.vy < 0) {
    const tRow = Math.floor(fb.y / TILE_SIZE);
    for (const col of [cL, cR]) {
      if (col >= 0 && col < MAP_COLS && tRow >= 0 && tRow < MAP_ROWS &&
          isSolid(MAP[tRow * MAP_COLS + col])) {
        fb.y  = (tRow + 1) * TILE_SIZE;
        fb.vy = -fb.vy * 0.5; // 天井は少し弱く反射
        return false;
      }
    }
  }

  // ※ 側面（壁）バウンドは廃止 → 水平速度を常に一定に保つため

  return false; // ファイアブロスの火の玉は消えない
}

// 火の玉 更新
function updateFireballs(dt) {
  for (let i = FIREBALLS.length - 1; i >= 0; i--) {
    const fb = FIREBALLS[i];

    // ファイアブロス・マリオ火の玉は重力あり（通常の 1/2 重力）
    if (fb.type === 'firebros' || fb.type === 'mario_fire') {
      fb.vy = Math.min(fb.vy + GRAVITY * 0.5 * dt, MAX_FALL_SPEED);
    }

    fb.x += fb.vx * dt;
    fb.y += fb.vy * dt;

    // ステージ外 → 削除
    if (fb.x < -200 || fb.x > STAGE_WIDTH + 200 || fb.y > LH + 200 || fb.y < -400) {
      FIREBALLS.splice(i, 1); continue;
    }

    // タイル衝突
    if (fireballTileCollision(fb)) { FIREBALLS.splice(i, 1); continue; }

    // リフトとのバウンド（ファイアブロス・マリオ火の玉・落下中）
    if ((fb.type === 'firebros' || fb.type === 'mario_fire') && fb.vy > 0) {
      for (const l of LIFTS) {
        const fbB = fb.y + fb.h;
        if (fb.x < l.x + l.w && fb.x + fb.w > l.x &&
            fbB >= l.y - 4 && fbB <= l.y + l.h + 8) {
          fb.y  = l.y - fb.h;
          fb.vy = fb.initVy; // 初期速度で跳ね返る（高さ一定）
          break;
        }
      }
    }

    // ファイアブロス/マリオ火の玉: 水平速度を常に初期値に強制維持
    if (fb.type === 'firebros' || fb.type === 'mario_fire') fb.vx = fb.initVx;

    // マリオ火の玉: パックン/ファイアブロスに当たると敵を倒して消滅
    if (fb.type === 'mario_fire') {
      let hitEnemy = false;
      for (let j = ENEMIES.length - 1; j >= 0; j--) {
        const e = ENEMIES[j];
        // パックンは emerged 状態のみヒット
        const isPakkun = e.imgKey === 'パックン' || e.imgKey === 'パックン上';
        if (isPakkun && e.pipeState !== 'emerged') continue;
        // パックンの実ヒットボックス（renderOffsetY=0 のときのみ当たり判定）
        const ey = isPakkun ? e.y : e.y;
        if (fb.x < e.x + e.w && fb.x + fb.w > e.x &&
            fb.y < ey + e.h && fb.y + fb.h > ey) {
          killEnemy(e, j);
          hitEnemy = true;
          break;
        }
      }
      if (hitEnemy) { FIREBALLS.splice(i, 1); continue; }
      continue; // mario_fire はマリオには当たらない
    }

    // 敵の火の玉（firebros/pakkun）: マリオとの衝突（INVINCIBLE=false の場合のみダメージ）
    if (!INVINCIBLE &&
        fb.x < mario.x + mario.w && fb.x + fb.w > mario.x &&
        fb.y < mario.y + mario.h && fb.y + fb.h > mario.y) {
      FIREBALLS.splice(i, 1);
      damageMario();
      if (gameState !== 'playing') return;
    }
  }
}

// 敵 AI（射撃タイマー管理）
function updateEnemies(dt) {
  if (goalPhase !== 'none') return; // ゴール演出中はスキップ
  for (const e of ENEMIES) {
    // 画面外の敵はスキップ → 画面に入った瞬間から攻撃開始
    const screenX = e.x - cameraX;
    if (screenX + e.w < 0 || screenX > LW) continue;

    // パックンは emerged 状態のみ攻撃（土管アニメーション管理）
    const isPakkun = e.imgKey === 'パックン' || e.imgKey === 'パックン上';
    if (isPakkun && e.pipeState !== 'emerged') continue;

    // 初回（画面に入った瞬間 or 出現完了時）のタイマー初期化
    // ファイアブロスは即発射（0）、パックンは emerged 時に shootTimer=0 設定済み
    if (e.shootTimer === undefined) {
      const isFB = e.imgKey === 'ファイアブロス';
      e.shootTimer = isFB ? 0 : Math.random() * FB_INTERVAL_PAKKUN;
    }
    e.shootTimer -= dt;
    if (e.shootTimer > 0) continue;

    const mx   = mario.x + mario.w / 2;
    const my   = mario.y + mario.h / 2;
    const ex   = e.x + e.w / 2;
    const ey   = e.y + e.h / 2;
    const dx   = mx - ex;
    const dy   = my - ey;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const isFB = e.imgKey === 'ファイアブロス';
    const interval = isFB ? FB_INTERVAL_FIREBROS : FB_INTERVAL_PAKKUN;

    e.shootTimer = interval;
    if (dist > FB_SHOOT_RANGE || dist === 0) continue;

    // 発射位置（敵の中心）
    const fbX = ex - FIREBALL_SIZE / 2;
    const fbY = ey - FIREBALL_SIZE / 2;

    if (isFB) {
      // ファイアブロス: 水平方向＋重力投げ（左右2パターン）
      const dir = dx >= 0 ? 1 : -1;
      spawnFireball('firebros', fbX, fbY, FB_SPEED_FIRO_X * dir, FB_SPEED_FIRO_Y);
    } else {
      // パックン: マリオへの直線
      spawnFireball('pakkun', fbX, fbY,
        (dx / dist) * FB_SPEED_PAKKUN,
        (dy / dist) * FB_SPEED_PAKKUN);
    }
  }
}

// ファイアブロス 横移動 AI（リフト上でパトロール・端で折り返し）
const FB_PATROL_SPEED = 55; // px/s
function updateEnemyMovement(dt) {
  for (const e of ENEMIES) {
    if (e.imgKey !== 'ファイアブロス') continue;
    if (e.moveDir === undefined) e.moveDir = 1;

    // 現在乗っているリフトを探す
    let rideL = null;
    for (const l of LIFTS) {
      if (Math.abs((e.y + e.h) - l.y) <= 8 &&
          e.x + e.w > l.x + 2 && e.x < l.x + l.w - 2) {
        rideL = l; break;
      }
    }
    if (!rideL) continue; // リフト上にいないときは移動しない

    e.x += FB_PATROL_SPEED * e.moveDir * dt;

    // リフト端で折り返し（落ちない）
    if (e.x < rideL.x) {
      e.x = rideL.x;
      e.moveDir = 1;
    } else if (e.x + e.w > rideL.x + rideL.w) {
      e.x = rideL.x + rideL.w - e.w;
      e.moveDir = -1;
    }
  }
}

// パックン土管アニメーション（物理移動方式）
// idle → emerging → emerged（攻撃） → retreating → idle
// スプライトを renderOffsetY で上下移動し、土管・タイルが上から被さることで出現演出
function updatePakkunPipe(dt) {
  for (const e of ENEMIES) {
    if (e.imgKey !== 'パックン' && e.imgKey !== 'パックン上') continue;

    const isBottom = e.imgKey === 'パックン'; // 床パックン(上向き出現)
    // 隠れ位置: 床=+e.h(下へ), 天井=-e.h(上へ)
    const hideOffset = isBottom ? e.h : -e.h;

    // 初期化
    if (e.pipeState === undefined) {
      e.pipeState     = 'idle';
      e.renderOffsetY = hideOffset;
      e.stayTimer     = 0;
    }

    // 画面外に出たら idle にリセット
    const screenX = e.x - cameraX;
    if (screenX + e.w < 0 || screenX > LW) {
      e.pipeState     = 'idle';
      e.renderOffsetY = hideOffset;
      e.shootTimer    = undefined;
      continue;
    }

    const dist = Math.hypot(
      mario.x + mario.w / 2 - (e.x + e.w / 2),
      mario.y + mario.h / 2 - (e.y + e.h / 2)
    );

    if (e.pipeState === 'idle') {
      e.renderOffsetY = hideOffset;
      if (dist <= PAKKUN_DETECT_RANGE) {
        e.pipeState = 'emerging';
      }

    } else if (e.pipeState === 'emerging') {
      // renderOffsetY を 0（完全出現）に向けて移動
      if (isBottom) {
        e.renderOffsetY -= PAKKUN_EMERGE_SPEED * dt; // 上へ（値を減らす）
        if (e.renderOffsetY <= 0) {
          e.renderOffsetY = 0;
          e.pipeState     = 'emerged';
          e.stayTimer     = PAKKUN_STAY_TIME;
          e.shootTimer    = 0; // 完全出現と同時に発射開始
        }
      } else {
        e.renderOffsetY += PAKKUN_EMERGE_SPEED * dt; // 下へ（値を増やす）
        if (e.renderOffsetY >= 0) {
          e.renderOffsetY = 0;
          e.pipeState     = 'emerged';
          e.stayTimer     = PAKKUN_STAY_TIME;
          e.shootTimer    = 0;
        }
      }

    } else if (e.pipeState === 'emerged') {
      e.renderOffsetY = 0;
      e.stayTimer -= dt;
      if (e.stayTimer <= 0) {
        e.pipeState  = 'retreating';
        e.shootTimer = undefined; // 退場中は撃たない
      }

    } else if (e.pipeState === 'retreating') {
      // hideOffset に向けて戻る
      if (isBottom) {
        e.renderOffsetY += PAKKUN_EMERGE_SPEED * dt; // 下へ
        if (e.renderOffsetY >= hideOffset) {
          e.renderOffsetY = hideOffset;
          e.pipeState     = 'idle';
          e.shootTimer    = undefined;
        }
      } else {
        e.renderOffsetY -= PAKKUN_EMERGE_SPEED * dt; // 上へ
        if (e.renderOffsetY <= hideOffset) {
          e.renderOffsetY = hideOffset;
          e.pipeState     = 'idle';
          e.shootTimer    = undefined;
        }
      }
    }
  }
}

// 火の玉 描画
function drawFireballs() {
  ctx.save();
  for (const fb of FIREBALLS) {
    const sx = fb.x - cameraX;
    if (sx + fb.w < 0 || sx > LW) continue;
    const cx = sx + fb.w / 2;
    const cy = fb.y + fb.h / 2;
    const r  = fb.w / 2;
    // グロー（外側）
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.2);
    grad.addColorStop(0,   '#fffff0');
    grad.addColorStop(0.3, '#ffcc00');
    grad.addColorStop(0.7, '#ff5500');
    grad.addColorStop(1,   'rgba(255,80,0,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, r * 2.2, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    // コア（白い中心点）
    ctx.beginPath();
    ctx.arc(cx, cy, r * 0.6, 0, Math.PI * 2);
    ctx.fillStyle = '#fffff0';
    ctx.fill();
  }
  ctx.restore();
}

function drawOverlayTiles() {
  const startCol = Math.max(0, Math.floor(cameraX / TILE_SIZE));
  const endCol   = Math.min(MAP_COLS-1, Math.ceil((cameraX+LW) / TILE_SIZE));
  ctx.save();
  ctx.globalAlpha = 0.30;
  for (let r = 0; r < MAP_ROWS; r++) {
    const sy = r * TILE_SIZE;
    for (let c = startCol; c <= endCol; c++) {
      const id = MAP_OVERLAY[r * MAP_COLS + c];
      if (id === 0) continue;
      drawTile(c * TILE_SIZE - cameraX, sy, id);
    }
  }
  ctx.restore();
}

function drawTiles() {
  const startCol = Math.max(0, Math.floor(cameraX / TILE_SIZE));
  const endCol   = Math.min(MAP_COLS-1, Math.ceil((cameraX+LW) / TILE_SIZE));
  for (let r=0; r<MAP_ROWS; r++) {
    const sy = r * TILE_SIZE;
    let c = startCol;
    while (c <= endCol) {
      const id = MAP[r*MAP_COLS+c];
      if (id === 0) { c++; continue; }
      if (id === 11) {
        // 土管中: 連続する幅を1枚でストレッチ描画（エディタと同様）
        let w = 0;
        while (c+w < MAP_COLS && MAP[r*MAP_COLS+c+w] === 11) w++;
        const sx = c*TILE_SIZE - cameraX;
        if (imgReady('土管中')) {
          ctx.drawImage(IMGS['土管中'], sx, sy, w*TILE_SIZE, TILE_SIZE);
        } else {
          ctx.fillStyle='#1a6b1a'; ctx.fillRect(sx, sy, w*TILE_SIZE, TILE_SIZE);
          ctx.strokeStyle='#000'; ctx.lineWidth=1; ctx.strokeRect(sx, sy, w*TILE_SIZE, TILE_SIZE);
        }
        c += w;
      } else {
        drawTile(c*TILE_SIZE - cameraX, sy, id);
        c++;
      }
    }
  }
}

// ---- 土管（1枚画像を拡大） ----
function drawPipes() {
  for (const p of PIPES) {
    const sx = p.x - cameraX;
    if (sx + p.w < 0 || sx > LW) continue;
    ctx.save();
    if (imgReady('土管')) {
      if (p.flip) {
        ctx.translate(sx + p.w/2, p.y + p.h/2);
        ctx.scale(1, -1);
        ctx.drawImage(IMGS['土管'], -p.w/2, -p.h/2, p.w, p.h);
      } else {
        ctx.drawImage(IMGS['土管'], sx, p.y, p.w, p.h);
      }
    } else {
      ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
      ctx.fillRect(sx, p.y, p.w, p.h); ctx.strokeRect(sx, p.y, p.w, p.h);
    }
    ctx.restore();
  }
}

// ---- マリオ ----
function drawMario() {
  // ダメージ後の無敵点滅（8Hz）
  if (mario.invincibleTimer > 0 && Math.floor(mario.invincibleTimer * 8) % 2 === 0) return;

  // enter フェーズ中はフェードアウト
  let alpha = 1;
  if (goalPhase === 'enter') {
    alpha = Math.max(0, goalTimer / GOAL_ENTER_DURATION);
  }
  if (alpha <= 0) return;

  ctx.globalAlpha = alpha;

  const sx = Math.round(mario.x - cameraX);
  const sy = Math.round(mario.y);

  // slide中はポールに掴まっているように少し傾ける（実スプライト使用）
  if (goalPhase === 'slide') {
    ctx.save();
    ctx.translate(sx + mario.w / 2, sy + mario.h / 2);
    ctx.rotate(0.18);
    const slideKey = mario.state === 'fire'  ? 'ファイアマリオ'  :
                     mario.state === 'super' ? 'スーパーマリオ' : 'マリオ';
    if (imgReady(slideKey)) {
      ctx.drawImage(IMGS[slideKey], -mario.w/2, -mario.h/2, mario.w, mario.h);
    } else if (imgReady('マリオ')) {
      ctx.drawImage(IMGS['マリオ'], -mario.w/2, -mario.h/2, mario.w, mario.h);
    } else {
      const fbCol = mario.state === 'fire' ? '#ff6622' :
                    mario.state === 'super' ? '#4488ff' : '#ee3322';
      ctx.fillStyle = fbCol;
      ctx.fillRect(-mario.w/2, -mario.h/2, mario.w, mario.h);
    }
    ctx.restore();
    ctx.globalAlpha = 1;
    return;
  }

  // 専用スプライトキー（スーパー/ファイア専用画像 → なければ通常マリオ画像 → なければnull）
  const stateKey = mario.state === 'fire'  ? 'ファイアマリオ'  :
                   mario.state === 'super' ? 'スーパーマリオ' : 'マリオ';
  const hasStateImg = imgReady(stateKey);
  const hasMarioImg = imgReady('マリオ');

  // ── ケース1: 専用スプライトあり → そのまま描画 ──
  if (hasStateImg) {
    ctx.save();
    if (mario.dir === -1) {
      ctx.translate(sx + mario.w/2, sy + mario.h/2);
      ctx.scale(-1, 1);
      ctx.drawImage(IMGS[stateKey], -mario.w/2, -mario.h/2, mario.w, mario.h);
    } else {
      ctx.drawImage(IMGS[stateKey], sx, sy, mario.w, mario.h);
    }
    ctx.restore();

  // ── ケース2: マリオ画像のみあり → mario.w × mario.h に引き伸ばして1枚描画 ──
  } else if (hasMarioImg) {
    ctx.save();
    if (mario.dir === -1) {
      ctx.translate(sx + mario.w/2, sy + mario.h/2);
      ctx.scale(-1, 1);
      ctx.drawImage(IMGS['マリオ'], -mario.w/2, -mario.h/2, mario.w, mario.h);
    } else {
      ctx.drawImage(IMGS['マリオ'], sx, sy, mario.w, mario.h);
    }
    ctx.restore();

  // ── ケース3: 完全フォールバック（画像なし）──
  } else {
    // 矩形フォールバック（strokeRectなし = 四角形に見えない）
    const fbCol = mario.state === 'fire' ? '#ff6622' :
                  mario.state === 'super' ? '#4488ff' : '#ffffff';
    ctx.fillStyle = fbCol;
    ctx.fillRect(sx, sy, mario.w, mario.h);
    // 簡易的な目
    const eyeX = mario.dir === 1 ? sx + mario.w - 12 : sx + 6;
    const eyeY = sy + (mario.state === 'small' ? 8 : 12);
    ctx.fillStyle = '#000';
    ctx.fillRect(eyeX, eyeY, 5, 5);
  }

  ctx.globalAlpha = 1;
}

// ---- ゴールポール ＋ 家 ----
function drawGoalPole() {
  const fy = floorY();

  // ── ゴールポール（縦横2倍） ──
  const poleH    = TILE_UNIT * 24;  // 720px（旧360の2倍）
  const dispW    = 92;              // 表示幅（旧46の2倍）
  const sx       = GOAL_X - cameraX;

  if (sx + dispW >= -10 && sx - dispW <= LW + 10) {
    const poleY = fy - poleH;

    if (imgReady('ゴールポール')) {
      ctx.drawImage(IMGS['ゴールポール'], sx - dispW / 2, poleY, dispW, poleH);
    } else {
      ctx.fillStyle   = '#ffffff';
      ctx.strokeStyle = '#000000';
      ctx.lineWidth   = 2;
      ctx.fillRect(sx - 6, poleY, 12, poleH);
      ctx.strokeRect(sx - 6, poleY, 12, poleH);
      const flagW = 100, flagH = 60;
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.moveTo(sx + 6,         poleY);
      ctx.lineTo(sx + 6 + flagW, poleY + flagH / 2);
      ctx.lineTo(sx + 6,         poleY + flagH);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }
  }

  // ── ゴール（家）：縦横2倍 + 家下の地面を描画 ──
  const houseW = TILE_SIZE * 8;   // 400px（旧200の2倍）
  const houseH = TILE_SIZE * 8;   // 400px（旧200の2倍）
  const hx     = HOUSE_X - cameraX;

  if (hx + houseW >= -TILE_SIZE && hx <= LW + TILE_SIZE) {
    // 家の下の地面（ゴールポール〜家右端まで連続して描画）
    // fy = floorY() = 地面のY座標（row17のtop = 850）
    const groundStartX = Math.max(GOAL_X - 100, STAGE_WIDTH - 550); // ゴール付近から
    const groundEndX   = HOUSE_X + houseW;
    for (let gx = groundStartX; gx < groundEndX; gx += TILE_SIZE) {
      const gsx = gx - cameraX;
      if (gsx + TILE_SIZE < 0 || gsx > LW) continue;
      // 地面上タイル
      if (imgReady('地面上')) {
        ctx.drawImage(IMGS['地面上'], gsx, fy, TILE_SIZE, TILE_SIZE);
      } else {
        ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=1;
        ctx.fillRect(gsx, fy, TILE_SIZE, TILE_SIZE);
        ctx.strokeRect(gsx, fy, TILE_SIZE, TILE_SIZE);
      }
      // 地面中タイル（画面下まで）
      for (let dy = TILE_SIZE; fy + dy < LH + TILE_SIZE; dy += TILE_SIZE) {
        if (imgReady('地面中')) {
          ctx.drawImage(IMGS['地面中'], gsx, fy + dy, TILE_SIZE, TILE_SIZE);
        } else {
          ctx.fillStyle='#7B3511';
          ctx.fillRect(gsx, fy + dy, TILE_SIZE, TILE_SIZE);
        }
      }
    }

    // 家を描画
    if (imgReady('ゴール')) {
      ctx.drawImage(IMGS['ゴール'], hx, fy - houseH, houseW, houseH);
    } else {
      ctx.fillStyle='#fff'; ctx.strokeStyle='#000'; ctx.lineWidth=2;
      ctx.fillRect(hx, fy - houseH, houseW, houseH);
      ctx.strokeRect(hx, fy - houseH, houseW, houseH);
    }
  }
}

// ---- HUD ----
function drawHUD() {
  ctx.save();
  ctx.textBaseline = 'top';
  ctx.font         = "bold 20px 'Chlorinap', monospace";
  ctx.shadowColor  = '#000';
  ctx.shadowBlur   = 4;
  ctx.fillStyle    = '#fff';

  ctx.textAlign = 'left';
  ctx.fillText('LIVES ' + lives,                          20, 16);
  ctx.fillText('COIN  ' + String(coins).padStart(2, '0'), 20, 42);

  ctx.textAlign = 'center';
  ctx.fillText('SCORE',                                   LW / 2, 16);
  ctx.fillText(String(score).padStart(6, '0'),            LW / 2, 42);

  ctx.textAlign = 'right';
  ctx.fillText('TIME  ' + String(timer).padStart(3, '0'), LW - 20, 16);
  // スターコイン（右上・タイマーの下）
  ctx.fillStyle = starCoins >= 3 ? '#FFD700' : '#fff';
  ctx.fillText('★  ' + starCoins + ' / 3', LW - 20, 42);

  ctx.restore();
}

// ---- オーバーレイ ----
function drawOverlay(mainText, mainColor, subText) {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, LW, LH);

  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  ctx.fillStyle = mainColor;
  ctx.font      = "bold 56px 'Chlorinap', monospace";
  ctx.fillText(mainText, LW / 2, LH / 2 - 30);

  ctx.fillStyle = '#fff';
  ctx.font      = "24px 'Chlorinap', monospace";
  ctx.fillText(subText, LW / 2, LH / 2 + 40);
}

// ============================================================
// デバッグトグルボタン
// ============================================================
(function setupDebugButtons() {
  const btnInv = document.getElementById('btn-inv');
  const btnInf = document.getElementById('btn-inf');
  function updateBtn(btn, val, label) {
    btn.textContent = label + ': ' + (val ? 'ON' : 'OFF');
    btn.style.background = val ? '#003300' : '#330000';
    btn.style.color       = val ? '#0f0'    : '#f44';
    btn.style.borderColor = val ? '#0a0'    : '#a00';
  }
  btnInv.addEventListener('click', () => {
    INVINCIBLE = !INVINCIBLE;
    updateBtn(btnInv, INVINCIBLE, '無敵');
    btnInv.blur();
  });
  btnInf.addEventListener('click', () => {
    infiniteJump = !infiniteJump;
    updateBtn(btnInf, infiniteJump, '∞ジャンプ');
    btnInf.blur();
  });
})();

// ============================================================
// GAME LOOP
// ============================================================
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}
requestAnimationFrame(gameLoop);
